# agents/n/docker-compose.yml
# Generated by Fleet Commander.
# Mounted by Coolify Application "openclaw-n" via
# docker_compose_location = /agents/n/docker-compose.yml
#
# Topology: 1 Coolify Application per agent. Each Application is
# network-isolated, so the browser sidecar lives in this same compose
# (service-name DNS does NOT cross Application boundaries in Coolify v4).
services:
  openclaw:
    image: ${FLEET_IMAGE:-ghcr.io/nikoxx99/openclaw-fleet:latest}
    restart: unless-stopped
    environment:
      AGENT_ID: n
      FLEET_REF: ${FLEET_REF:-main}
      FLEET_REPO_URL: ${FLEET_REPO_URL:-https://github.com/Nikoxx99/openclaw-fleet-config.git}
      OPENCLAW_DOCKER_INIT_SCRIPT: /opt/fleet-init.sh
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_PORT: 18789
      OPENCLAW_GATEWAY_BIND: lan
      OPENCLAW_STATE_DIR: /data/.openclaw
      OPENCLAW_WORKSPACE_DIR: /data/workspace
      OPENCLAW_CUSTOM_CONFIG: /app/config/openclaw.json
      OPENCLAW_BUNDLED_SKILLS_DIR: /data/.openclaw/skills
      NODE_OPTIONS: --max-old-space-size=2048
      UV_THREADPOOL_SIZE: 16
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 5000
      BROWSER_CDP_URL: http://browser:9223
      BROWSER_DEFAULT_PROFILE: openclaw
      BROWSER_EVALUATE_ENABLED: "true"
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
    volumes:
      - openclaw_n_data:/data
    depends_on:
      browser:
        condition: service_healthy
    ports:
      - ${PORT:-0}:8080
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - --max-time
        - "5"
        - http://127.0.0.1:8080/healthz
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
  browser:
    image: coollabsio/openclaw-browser:latest
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ:-Etc/UTC}
      CHROME_CLI: --remote-debugging-port=9222
    volumes:
      - browser_n_data:/config
    shm_size: 2g
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/9222' || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  openclaw_n_data:
  browser_n_data:
